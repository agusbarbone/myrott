  </header>
    <main class="container-fluid h-auto">
        <div class="row">
            <div class="col-sm-12 d-flex justify-content-center">
                <img src="../assets/images/logo.png" class="rounded-5" alt="logo" id="logo">
            </div>
        </div>
        
      <div class="banner">
            <div class="container p-5 h-auto">            
           <div class="card mx-3 mt-n5 shadow-lg" style="border-radius:0px; border:none">
            <div class="card-body p-5">
              <h4 class="card-title mb-3 text-dark text-uppercase text-center" style="font-weight:700">Formulario de Registro</h4>
        
              <form>
                <div class="row">
                  <div class="col-sm-12 col-md-6">
                    <div class="form-floating mb-3">
                      <input type="text" class="form-control" id="floatingTextInput1" placeholder="John">
                      <label for="floatingTextInput1">Nombre</label>
                    </div>
                  </div>
                  <div class="col-sm-12 col-md-6">
                    <div class="form-floating mb-3">
                      <input type="text" class="form-control" id="floatingTextInput2" placeholder="Smith">
                      <label for="floatingTextInput2">Apellido</label>
                    </div>
                  </div>
                </div>
                <div class="row">
                  <div class="col-sm-12 col-md-6">
                    <div class="form-floating mb-3">
                      <input type="password" class="form-control" id="floatingTextInput1" placeholder="John">
                      <label for="floatingTextInput1">Contraseña</label>
                    </div>
                  </div>
                  <div class="col-sm-12 col-md-6">
                    <div class="form-floating mb-3">
                      <input type="password" class="form-control" id="floatingTextInput2" placeholder="Smith">
                      <label for="floatingTextInput2">Repetir Contraseña</label>
                    </div>
                  </div>
                </div>
                <div class="form-floating mb-3">
                  <input type="email" class="form-control" id="floatingEmailInput" placeholder="name@example.com">
                  <label for="floatingEmailInput">Email</label>
                </div>
                <div class="form-check form-switch mb-3">
                  <input class="form-check-input" type="checkbox" id="flexSwitchCheckChecked" checked>
                  <label class="form-check-label" for="flexSwitchCheckChecked">Soy mayor de 18 años</label>
                </div>
                <div class="text-center">
                <button type="submit" class="btn btn-dark" >Enviar</button>
                <a href="../index.html" class="btn btn-dark">Atras</a>
              </div>
              </form>
            </div>
          </div>
        </div>
        </div>
    </main>
    <footer class="bg-dark text-white h-auto">
      <div class="container">
        <div class="row">
